services:
  huntiandb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huntiandb
    ports:
      - "5408:5408"   # PostgreSQL Wire Protocol
      - "3000:3000"   # REST API + Web Portal
    volumes:
      - huntian_data:/app/data
    environment:
      - DATA_DIR=/app/data
      - STATIC_DIR=/app/static
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  huntian_data:
