name: 性能基准测试

on:
  push:
    tags:
      - 'v*'              
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:       

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install psycopg2-binary requests
          # 如需数据库二进制文件，请在此下载或编译
          # 例如: cargo build --release

      - name: 启动 HunTianDB（按需）
        run: |
          # 调整此命令以在后台启动数据库
          # 例如: ./target/release/huntiandb &
          # 等待数据库就绪
          echo "正在启动 HunTianDB..."
          # 占位 — 替换为实际的启动命令
          sleep 5

      - name: 运行基准测试
        id: bench
        run: |
          mkdir -p benchmark/results
          python3 benchmark/run_bench.py

      - name: 上传测试报告为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark/results/report.md

      - name: 附加报告到 Release（标签推送时）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: benchmark/results/report.md
          append_body: true
          body: "## 基准测试结果\n\n详见附件报告。"
