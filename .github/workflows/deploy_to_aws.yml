name: HunTianDB 部署到 AWS ECR

on:
  push:
    tags:
      - "*"          
  workflow_dispatch:

env:
  APP_NAME: huntiandb
  ECR_REPOSITORY: huntiandb
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  build-and-push:
    name: 构建并推送 Docker 镜像到 ECR
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 AWS 凭证
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 登录 Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 确保 ECR 仓库存在
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null \
            || aws ecr create-repository --repository-name $ECR_REPOSITORY \
                --image-tag-mutability MUTABLE \
                --image-scanning-configuration scanOnPush=true

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 设置 QEMU (用于多架构构建)
        uses: docker/setup-qemu-action@v3

      - name: 构建并推送多架构镜像到 ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 构建标签列表
          TAGS="-t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          TAGS="$TAGS -t $ECR_REGISTRY/$ECR_REPOSITORY:development"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            TAGS="$TAGS -t $ECR_REGISTRY/$ECR_REPOSITORY:$TAG_NAME"
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $TAGS \
            --push \
            .